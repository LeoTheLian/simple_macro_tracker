services:
  - type: web
    name: simple-macro-tracker
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: simple-macro-tracker.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://simple-macro-tracker.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: simple-macro-tracker-db
          property: connectionString
      - key: USDA_API_KEY
        sync: false

databases:
  - name: simple-macro-tracker-db
    plan: free
